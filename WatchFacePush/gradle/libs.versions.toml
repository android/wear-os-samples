[versions]
agp = "9.2.1"
wear-compose-material3 = "1.6.2"
wear-compose = "1.6.2"
compose-tooling = "1.6.2"
kotlin = "2.3.21"
lifecycleViewmodelKtx = "2.11.0"
composeBom = "2026.06.00"
activityCompose = "1.13.0"
coreSplashscreen = "1.2.0"
watchfacePush = "1.0.0"
ktlint = "1.4.0"

[libraries]
compose-navigation = { module = "androidx.wear.compose:compose-navigation", version.ref = "wear-compose" }
lifecycle-viewmodel-ktx = { module = "androidx.lifecycle:lifecycle-viewmodel-ktx", version.ref = "lifecycleViewmodelKtx" }
compose-bom = { group = "androidx.compose", name = "compose-bom", version.ref = "composeBom" }
ui = { group = "androidx.compose.ui", name = "ui" }
wear-compose-ui-tooling = { group = "androidx.wear.compose", name = "compose-ui-tooling", version.ref = "compose-tooling" }
ui-tooling = { group = "androidx.compose.ui", name = "ui-tooling" }
ui-test-manifest = { group = "androidx.compose.ui", name = "ui-test-manifest" }
compose-material = { group = "androidx.wear.compose", name = "compose-material3", version.ref = "wear-compose-material3" }
compose-foundation = { group = "androidx.wear.compose", name = "compose-foundation", version.ref = "wear-compose" }
activity-compose = { group = "androidx.activity", name = "activity-compose", version.ref = "activityCompose" }
core-splashscreen = { group = "androidx.core", name = "core-splashscreen", version.ref = "coreSplashscreen" }
watchface-push = { group = "androidx.wear.watchfacepush", name="watchfacepush", version.ref = "watchfacePush" }

[plugins]
androidApplication = { id = "com.android.application", version.ref = "agp" }
androidLibrary = { id = "com.android.library", version.ref = "agp" }
jetbrainsKotlinAndroid = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
compose-compiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
com-diffplug-spotless = "com.diffplug.spotless:8.7.0"
